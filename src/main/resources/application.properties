spring.application.name=CompanySystem

spring.datasource.url=jdbc:mysql://localhost:3306/company_system
spring.datasource.username=root
spring.datasource.password=Root@12345

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
#spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#for data seeding
#spring.jpa.defer-datasource-initialization=true
#spring.sql.init.mode=always
#spring.sql.init.data-locations=classpath:data.sql



#Rest client baseUrl
freeCurrency.baseUrl = https://api.freecurrencyapi.com


#logging
logging.pattern.console=%d{dd-mm-yyyy hh:MM:ss} [%level] %c{1.} --- %m%n
#logging.file.name=application.log
logging.config=classpath:logback-spring.xml

#actuator configuration
management.endpoints.web.exposure.include=*
management.info.env.enabled=true
info.app.author=Asif Ali
info.app.version=1.0.0
#info.app.documentation=https://AsifAli.com
management.endpoint.env.show-values=always
management.info.build.enabled=true
management.info.git.enabled=true
management.info.java.enabled=true
management.info.os.enabled=true


#swagger-open api
springdoc.api-docs.enabled = true